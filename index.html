<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Life Planner"/>
  <meta name="theme-color" content="#8B1A1A"/>
  <title>Life Planner</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <p class="header-sub" id="headerSub">2025</p>
      <h1 class="header-title" id="headerTitle">Life Planner</h1>
    </div>
    <div class="header-right">
      <div class="header-pct" id="headerPct">0%</div>
      <button class="dark-btn" id="darkBtn" onclick="toggleDark()">☽</button>
    </div>
  </div>
  <div class="header-bar-wrap">
    <div class="header-bar" id="overallBar"></div>
  </div>
</header>

<main class="main">

  <!-- DASHBOARD -->
  <section class="page active" id="page-dashboard">
    <div class="metric-row">
      <div class="metric-card">
        <span class="metric-val" id="statDone">0</span>
        <span class="metric-lbl">Yearly Done</span>
      </div>
      <div class="metric-card">
        <span class="metric-val" id="statStreak">0</span>
        <span class="metric-lbl">Best Streak 🔥</span>
      </div>
      <div class="metric-card">
        <span class="metric-val" id="statPct">0%</span>
        <span class="metric-lbl">Overall</span>
      </div>
    </div>

    <p class="group-label">Progress</p>
    <div class="list-group" id="dashSummary"></div>

    <p class="group-label">Heatmap Tahun Ini</p>
    <div class="heatmap-card">
      <div class="heatmap-months" id="heatmapMonths"></div>
      <div class="heatmap-wrap">
        <div class="heatmap-days">
          <span></span><span>Sen</span><span></span><span>Rab</span><span></span><span>Jum</span><span></span>
        </div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
      </div>
      <div class="heatmap-legend">
        <span>Kurang</span>
        <div class="heatmap-leg-boxes">
          <div class="hm-cell" style="background:var(--hm0)"></div>
          <div class="hm-cell" style="background:var(--hm1)"></div>
          <div class="hm-cell" style="background:var(--hm2)"></div>
          <div class="hm-cell" style="background:var(--hm3)"></div>
          <div class="hm-cell" style="background:var(--hm4)"></div>
        </div>
        <span>Banyak</span>
      </div>
    </div>

    <p class="group-label">Per Kategori</p>
    <div class="list-group" id="dashCats"></div>
  </section>

  <!-- DAILY -->
  <section class="page" id="page-daily">
    <p class="page-date" id="dailyDate"></p>
    <div id="dailyCatList"></div>
    <p class="group-label" style="margin-top:24px">Kalender Bulan Ini</p>
    <div class="cal-month-card" id="dailyCalCard"></div>
  </section>

  <!-- WEEKLY -->
  <section class="page" id="page-weekly">
    <p class="page-date" id="weeklyDate"></p>
    <div id="weeklyCatList"></div>
    <p class="group-label" style="margin-top:24px">Kalender Bulan Ini</p>
    <div class="cal-month-card" id="weeklyCalCard"></div>
  </section>

  <!-- MONTHLY -->
  <section class="page" id="page-monthly">
    <p class="page-date" id="monthlyDate"></p>
    <div id="monthlyCatList"></div>
    <p class="group-label" style="margin-top:24px">Kalender Tahun Ini</p>
    <div class="cal-month-card" id="monthlyCalCard"></div>
  </section>

  <!-- YEARLY -->
  <section class="page" id="page-yearly">
    <p class="page-date" id="yearlyDate"></p>
    <div id="yearlyCatList"></div>
  </section>

</main>

<!-- TAB BAR -->
<nav class="tabbar">
  <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Home</span>
  </button>
  <button class="tab" id="tab-daily" onclick="switchTab('daily')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Daily</span>
  </button>
  <button class="tab" id="tab-weekly" onclick="switchTab('weekly')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Weekly</span>
  </button>
  <button class="tab" id="tab-monthly" onclick="switchTab('monthly')">
    <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    <span>Monthly</span>
  </button>
  <button class="tab" id="tab-yearly" onclick="switchTab('yearly')">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Yearly</span>
  </button>
</nav>

<!-- MODAL TAMBAH GOAL -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="addTitle">Tambah</h2>
    <input class="field" id="addText" type="text" placeholder="Nama habit / goal…"/>
    <input class="field" id="addDeadline" type="text" placeholder="Deadline (misal: Des 2025)" style="display:none"/>
    <div id="typeToggleWrap" style="display:none">
      <div class="seg-ctrl">
        <button class="seg active" id="segOnce" onclick="setType('once')">Sekali selesai</button>
        <button class="seg" id="segNumber" onclick="setType('number')">Target angka</button>
      </div>
    </div>
    <div id="numberWrap" style="display:none">
      <input class="field" id="addTarget" type="number" placeholder="Target total (misal: 12000)"/>
      <input class="field" id="addUnit" type="text" placeholder="Satuan (misal: €, buku, km)"/>
      <div class="seg-ctrl" id="accumToggle">
        <button class="seg active" id="segManual" onclick="setAccum(false)">Input manual</button>
        <button class="seg" id="segAccum" onclick="setAccum(true)">Akumulasi bulanan</button>
      </div>
      <input class="field" id="addMonthly" type="number" placeholder="Target per bulan (misal: 1000)" style="display:none"/>
    </div>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="closeAdd()">Batal</button>
      <button class="sheet-save" onclick="saveAdd()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL LOG BULANAN -->
<div class="overlay" id="logOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="logTitle">Log Bulan Ini</h2>
    <p class="sheet-hint" id="logHint"></p>
    <div id="logHistory"></div>
    <input class="field" id="logMonth" type="month"/>
    <input class="field" id="logVal" type="number" placeholder="Angka bulan ini…"/>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="closeLog()">Batal</button>
      <button class="sheet-save" onclick="saveLog()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL HARI (heatmap tap) -->
<div class="overlay" id="dayOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="dayTitle">Detail Hari</h2>
    <div id="dayBody"></div>
    <div class="sheet-actions">
      <button class="sheet-save" onclick="closeDay()">Tutup</button>
    </div>
  </div>
</div>

<!-- MODAL KALENDER HISTORY HABIT -->
<div class="overlay" id="calOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="calTitle">History</h2>
    <div id="calBody"></div>
    <div class="sheet-actions">
      <button class="sheet-save" onclick="closeCal()">Tutup</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
