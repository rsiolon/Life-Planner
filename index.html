<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Life Planner" />
    <meta name="theme-color" content="#8B1A1A" />
    <title>Life Planner</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>

    <header class="header">
      <div class="header-inner">
        <div>
          <h1 class="header-title" id="headerTitle">Life Planner</h1>
          <p class="header-sub" id="headerSub"></p>
        </div>
        <div class="header-pct" id="headerPct">0%</div>
      </div>
      <div class="overall-bar-wrap">
        <div class="overall-bar" id="overallBar"></div>
      </div>
    </header>

    <main class="main" id="mainContent">

      <section id="page-dashboard" class="page active">
        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-num" id="statDone">0</span>
            <span class="stat-lbl">Selesai</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="statTotal">0</span>
            <span class="stat-lbl">Total Goals</span>
          </div>
          <div class="stat-card">
            <span class="stat-num" id="statStreak">0</span>
            <span class="stat-lbl">Streak Terbaik 🔥</span>
          </div>
        </div>
        <div class="summary-row">
          <div class="summary-card" onclick="switchTab('daily')">
            <div class="summary-icon" style="background:#FFF3E0">📅</div>
            <div class="summary-info">
              <div class="summary-name">Daily</div>
              <div class="summary-pct" id="dashDailyPct">0%</div>
            </div>
            <div class="summary-bar-wrap"><div class="summary-bar" id="dashDailyBar"></div></div>
          </div>
          <div class="summary-card" onclick="switchTab('weekly')">
            <div class="summary-icon" style="background:#E8F5E9">🗓️</div>
            <div class="summary-info">
              <div class="summary-name">Weekly</div>
              <div class="summary-pct" id="dashWeeklyPct">0%</div>
            </div>
            <div class="summary-bar-wrap"><div class="summary-bar" id="dashWeeklyBar"></div></div>
          </div>
          <div class="summary-card" onclick="switchTab('yearly')">
            <div class="summary-icon" style="background:#EDE7F6">🎯</div>
            <div class="summary-info">
              <div class="summary-name">Yearly</div>
              <div class="summary-pct" id="dashYearlyPct">0%</div>
            </div>
            <div class="summary-bar-wrap"><div class="summary-bar" id="dashYearlyBar"></div></div>
          </div>
        </div>
        <div class="section-label">Per Kategori</div>
        <div id="dashCatList"></div>
      </section>

      <section id="page-daily" class="page">
        <div class="date-header" id="dailyDateHeader"></div>
        <div id="dailyCatList"></div>
      </section>

      <section id="page-weekly" class="page">
        <div class="date-header" id="weeklyDateHeader"></div>
        <div id="weeklyCatList"></div>
      </section>

      <section id="page-yearly" class="page">
        <div class="date-header" id="yearlyDateHeader"></div>
        <div id="yearlyCatList"></div>
      </section>

    </main>

    <nav class="tab-bar">
      <button class="tab-btn active" id="tab-dashboard" onclick="switchTab('dashboard')">
        <span class="tab-icon">🏠</span>
        <span class="tab-lbl">Dashboard</span>
      </button>
      <button class="tab-btn" id="tab-daily" onclick="switchTab('daily')">
        <span class="tab-icon">📅</span>
        <span class="tab-lbl">Daily</span>
      </button>
      <button class="tab-btn" id="tab-weekly" onclick="switchTab('weekly')">
        <span class="tab-icon">🗓️</span>
        <span class="tab-lbl">Weekly</span>
      </button>
      <button class="tab-btn" id="tab-yearly" onclick="switchTab('yearly')">
        <span class="tab-icon">🎯</span>
        <span class="tab-lbl">Yearly</span>
      </button>
    </nav>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h2 class="modal-title" id="modalTitle">Tambah Goal</h2>
        <input class="modal-input" id="modalGoalInput" type="text" placeholder="Nama goal lo..." />
        <input class="modal-input" id="modalDeadlineInput" type="text" placeholder="Deadline (contoh: Jun 2025)" />
        <div id="modalTargetWrap" style="display:none">
          <input class="modal-input" id="modalTargetInput" type="number" placeholder="Target angka (contoh: 50000000)" />
          <input class="modal-input" id="modalUnitInput" type="text" placeholder="Satuan (contoh: Rp, buku, km)" />
        </div>
        <div id="modalTypeToggle" style="display:none">
          <div class="type-toggle">
            <button class="type-btn active" id="typeBtnOnce" onclick="setGoalType('once')">Sekali selesai</button>
            <button class="type-btn" id="typeBtnNumber" onclick="setGoalType('number')">Ada target angka</button>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modalCancel">Batal</button>
          <button class="btn-save" id="modalSave">Simpan</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="calendarOverlay">
      <div class="modal">
        <h2 class="modal-title" id="calendarTitle">History</h2>
        <div id="calendarGrid"></div>
        <div class="modal-actions">
          <button class="btn-save" onclick="closeCalendar()">Tutup</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="progressOverlay">
      <div class="modal">
        <h2 class="modal-title" id="progressTitle">Update Progress</h2>
        <p class="modal-hint" id="progressHint"></p>
        <input class="modal-input" id="progressInput" type="number" placeholder="Masukkan angka sekarang..." />
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeProgressModal()">Batal</button>
          <button class="btn-save" onclick="saveProgress()">Simpan</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
